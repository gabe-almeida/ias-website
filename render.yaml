# Render Blueprint — deploys the IAS site + Science Hub CMS as one Node web
# service with a persistent disk holding the SQLite database and uploaded media.
# Import via Render Dashboard → New → Blueprint (points at this repo).
services:
  - type: web
    name: ias-website
    runtime: node
    # standard (2GB) — measured `next build` (Turbopack + Payload) peaks well
    # past the starter tier's 512MB, so starter OOMs during the build. Runtime
    # is light; if you later build elsewhere you could downshift the runtime.
    plan: standard
    region: ohio
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    # SQLite file + media both live here so they survive redeploys/restarts.
    disk:
      name: ias-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: "20.20.1"
      - key: NODE_ENV
        value: production
      # Generated once by Render and kept stable (rotating invalidates sessions).
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: DATABASE_URI
        value: file:/var/data/blog.sqlite
      - key: MEDIA_DIR
        value: /var/data/media
      - key: NEXT_PUBLIC_SITE_URL
        value: https://iasamerica.com
      # First-admin bootstrap. On boot, if the Users collection is empty and
      # these are set, an admin is auto-created so the public "create first
      # user" screen never appears. Set once for the first deploy, then unset
      # (and rotate the password in /admin) after you've logged in.
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: Admin
      # Cloudflare Turnstile (bot-gate on /admin login). Create a widget in the
      # CF dashboard → Turnstile, then paste the keys here. Leave blank to disable.
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      # Lead-form email notifications. Submissions are always saved to /admin;
      # RESEND_API_KEY enables the optional real-time email alert via Resend
      # (Render blocks SMTP, so an HTTP email API is required). Leave it blank to
      # disable email — capture still works. This is the ONLY email-related env
      # var: it is a secret/credential. The recipient and sender addresses are
      # NOT env vars — they live in the `notification-settings` global (SQLite,
      # editable at /admin → Leads → Email Notifications) so the client can change
      # them without a redeploy. See .env.example / globals/NotificationSettings.ts.
      - key: RESEND_API_KEY
        sync: false
